<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الوسائط المتقدم - رفع أو رابط فوري</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ========== المتغيرات العامة والثيمات ========== */
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-color: #333;
            --bg-color: #f0f0f0;
            --card-bg: white;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        .dark-theme {
            --primary-color: #9f7aea;
            --secondary-color: #6b46c1;
            --bg-gradient: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            --text-color: #f7fafc;
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            transition: var(--transition);
            padding-top: 70px;
            padding-bottom: 60px;
        }
        /* ========== الهيدر المتطور ========== */
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            transform: translateY(0);
        }

        .header.header-hidden {
            transform: translateY(-100%);
        }

        .header.header-shrink {
            padding: 5px 0;
            background: rgba(255,255,255,0.15);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            transition: padding 0.3s ease;
        }

        .header-shrink .nav-container {
            padding: 5px 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .logo i {
            margin-left: 8px;
            -webkit-text-fill-color: initial;
            color: #ffd700;
            font-size: 20px;
        }

        /* شريط البحث */
        .search-box {
            flex: 1;
            max-width: 400px;
            margin: 0 15px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 14px;
            transition: var(--transition);
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            background: rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .search-box button {
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 8px;
        }

        /* أزرار التنقل */
        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        .user-menu {
            position: relative;
        }

        .user-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            min-width: 200px;
            display: none;
            box-shadow: var(--shadow);
        }

        .user-menu:hover .user-dropdown {
            display: block;
        }
        /* ========== أزرار الإضافة (رفع + رابط) ========== */
        .actions-bar {
            max-width: 1400px;
            margin: 10px auto;
            padding: 0 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .upload-btn, .url-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            font-weight: 600;
            font-size: 15px;
        }
        .upload-btn:hover, .url-btn:hover {
            background: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .url-input-group {
            flex: 2;
            min-width: 250px;
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 60px;
            padding: 5px 5px 5px 15px;
            backdrop-filter: blur(8px);
            align-items: center;
        }
        .url-input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 0;
            font-size: 14px;
            outline: none;
        }
        .url-input-group input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        .url-input-group button {
            background: var(--primary-color);
            border: none;
            color: white;
            border-radius: 50px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .url-input-group button:hover {
            background: var(--secondary-color);
            transform: scale(0.97);
        }
        #uploadProgress {
            width: 100%;
            margin: 10px 0;
        }
        progress {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        progress::-webkit-progress-bar {
            background-color: rgba(255,255,255,0.2);
        }
        progress::-webkit-progress-value {
            background-color: var(--primary-color);
        }

        /* ========== التصنيفات ========== */
        .categories {
            max-width: 1400px;
            margin: 15px auto;
            padding: 0 30px;
        }
        .category-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) transparent;
        }
        .category-scroll::-webkit-scrollbar {
            height: 5px;
        }
        .category-scroll::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }
        .category-item {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            border: 2px solid transparent;
            font-size: 14px;
        }
        .category-item:hover,
        .category-item.active {
            background: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* ========== المعرض الرئيسي ========== */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }
        .gallery-title h1 {
            font-size: 32px;
            font-weight: 700;
        }
        .gallery-title p {
            opacity: 0.9;
        }
        .view-options {
            display: flex;
            gap: 10px;
        }
        .view-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        .view-btn.active {
            background: var(--primary-color);
        }

        /* شبكة الصور (بطاقات) */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .gallery.list-view {
            grid-template-columns: 1fr;
        }
        .gallery.list-view .gif-item {
            display: flex;
            gap: 20px;
        }
        .gallery.list-view .gif-item img,
        .gallery.list-view .gif-item video {
            width: 200px;
            height: 200px;
            object-fit: cover;
        }
        .gif-item {
            background: transparent;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gif-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .gif-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.7));
            opacity: 0;
            transition: var(--transition);
            z-index: 1;
            pointer-events: none;
        }
        .gif-item:hover::before {
            opacity: 1;
        }
        .gif-item img,
        .gif-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: var(--transition);
            border-radius: inherit;
        }
        .gif-item:hover img,
        .gif-item:hover video {
            transform: scale(1.1);
        }
        .gif-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            color: white;
            z-index: 2;
            transform: translateY(100%);
            transition: var(--transition);
        }
        .gif-item:hover .gif-overlay {
            transform: translateY(0);
        }
        .gif-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .gif-stats {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }
        .gif-actions {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
            z-index: 3;
            opacity: 0;
            transform: translateY(-10px);
            transition: var(--transition);
        }
        .gif-item:hover .gif-actions {
            opacity: 1;
            transform: translateY(0);
        }
        .action-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: #333;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .action-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.1);
        }
        .action-btn.liked {
            background: #ff4757;
            color: white;
        }
        .action-btn.saved {
            background: #ffd700;
            color: white;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .loading-spinner.show {
            display: block;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        .modal-content img,
        .modal-content video {
            width: 100%;
            height: auto;
            max-height: 80vh;
            border-radius: 10px;
        }
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
        .modal-actions {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .modal-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--card-bg);
            color: var(--text-color);
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification.show {
            display: flex;
        }
        .footer {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 40px 0 20px;
            margin-top: 60px;
        }
        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            color: white;
        }
        .copyright {
            text-align: center;
            padding-top: 40px;
            color: rgba(255,255,255,0.6);
        }
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 15px;
            }
            .search-box {
                max-width: 100%;
                margin: 10px 0;
            }
            .actions-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .url-input-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<header class="header">
    <nav class="nav-container">
        <div class="logo"><i class="fas fa-film"></i> معرض الوسائط</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث في الوسائط...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="nav-btn" id="notificationsBtn"><i class="fas fa-bell"></i></button>
            <div class="user-menu">
                <button class="nav-btn"><i class="fas fa-user"></i></button>
                <div class="user-dropdown">
                    <p style="margin-bottom: 10px;">مرحباً! 👋</p>
                    <button class="action-btn" style="width:100%; margin-bottom:5px;" onclick="login()"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
                    <button class="action-btn" style="width:100%; margin-bottom:5px;" onclick="register()"><i class="fas fa-user-plus"></i> إنشاء حساب</button>
                    <button class="action-btn" style="width:100%; background-color: #dc3545; color: white;" onclick="clearAllData()"><i class="fas fa-trash-alt"></i> مسح جميع البيانات</button>
                </div>
            </div>
        </div>
    </nav>
</header>

<div class="actions-bar">
    <label for="fileUpload" class="upload-btn">
        <i class="fas fa-cloud-upload-alt"></i> رفع ملف (GIF/فيديو/صورة)
    </label>
    <input type="file" id="fileUpload" accept="image/*,video/*" style="display: none;" multiple>
    
    <div class="url-input-group">
        <input type="text" id="mediaUrlInput" placeholder="ألصق رابط صورة أو فيديو (GIF, PNG, WEBP, MP4, WEBM...)" dir="ltr">
        <button id="addFromUrlBtn"><i class="fas fa-link"></i> إضافة</button>
    </div>
</div>
<div id="uploadProgress" style="margin: 0 30px 10px 30px; display: none;">
    <progress id="progressBar" value="0" max="100"></progress>
    <p id="progressStatus" style="color: white; font-size: 14px;"></p>
</div>

<div class="categories">
    <div class="category-scroll" id="categoryList">
        <div class="category-item active" data-category="all">الكل</div>
        <div class="category-item" data-category="general">عام</div>
    </div>
</div>

<div class="gallery-container">
    <div class="gallery-header">
        <div class="gallery-title"><h1>الوسائط المرفوعة</h1><p>تصفح ملفاتك المرفوعة أو المضافة عبر رابط</p></div>
        <div class="view-options">
            <button class="view-btn active" onclick="changeView('grid')"><i class="fas fa-th"></i></button>
            <button class="view-btn" onclick="changeView('list')"><i class="fas fa-list"></i></button>
        </div>
    </div>
    <div class="gallery" id="gallery"></div>
    <div class="loading-spinner" id="loadingSpinner"><div class="spinner"></div><p style="color: white; margin-top: 10px;">جاري تحميل المزيد...</p></div>
</div>

<div class="modal" id="mediaModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal(event)">&times;</span>
        <div id="modalMediaContainer"></div>
        <div class="modal-actions">
            <button class="modal-btn" onclick="downloadCurrentMedia()"><i class="fas fa-download"></i> تحميل</button>
            <button class="modal-btn" onclick="shareCurrentMedia()"><i class="fas fa-share-alt"></i> مشاركة</button>
            <button class="modal-btn" onclick="likeCurrentMedia()"><i class="fas fa-heart"></i> إعجاب</button>
        </div>
    </div>
</div>
<div class="notification" id="notification"><i class="fas fa-check-circle"></i><span id="notificationMessage"></span></div>

<footer class="footer">
    <div class="footer-content">
        <div class="footer-section"><h3>عن الموقع</h3><p>معرض وسائط متكامل يدعم الرفع والروابط (جميع الصيغ: صور، فيديوهات، GIF)</p><div class="social-links"><a href="#"><i class="fab fa-facebook-f"></i></a><a href="#"><i class="fab fa-twitter"></i></a></div></div>
        <div class="footer-section"><h3>روابط سريعة</h3><ul><li><a href="#">الرئيسية</a></li><li><a href="#">المفضلة</a></li></ul></div>
    </div>
    <div class="copyright"><p>جميع الحقوق محفوظة &copy; 2026</p></div>
</footer>
<script>
(function() {
    let db;
    const DB_NAME = 'MediaGalleryDBnnew';
    const STORE_NAME = 'media';
    const gallery = document.getElementById('gallery');
    let currentView = 'grid';
    let currentMediaList = [];
    let likedMedia = JSON.parse(localStorage.getItem('likedMedia')) || [];
    let savedMedia = JSON.parse(localStorage.getItem('savedMedia')) || [];
    let currentModalId = null;
    const activeBlobUrls = new Set();

    const themeToggle = document.getElementById('themeToggle');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const fileUpload = document.getElementById('fileUpload');
    const uploadProgressDiv = document.getElementById('uploadProgress');
    const progressBar = document.getElementById('progressBar');
    const progressStatus = document.getElementById('progressStatus');
    const modal = document.getElementById('mediaModal');
    const modalMediaContainer = document.getElementById('modalMediaContainer');
    const notification = document.getElementById('notification');
    const notificationMessage = document.getElementById('notificationMessage');
    const addFromUrlBtn = document.getElementById('addFromUrlBtn');
    const mediaUrlInput = document.getElementById('mediaUrlInput');

    const videoObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target;
            if (entry.isIntersecting) video.play().catch(() => {});
            else video.pause();
        });
    }, { threshold: 0.3 });

    function showNotification(message, type = 'success') {
        notificationMessage.textContent = message;
        notification.style.display = 'flex';
        setTimeout(() => notification.style.display = 'none', 3000);
    }
    function revokeAllBlobUrls() {
        activeBlobUrls.forEach(url => URL.revokeObjectURL(url));
        activeBlobUrls.clear();
    }
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => { db = request.result; resolve(); };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                    store.createIndex('date', 'date');
                }
            };
        });
    }
    function saveMediaToDB(file, blobData) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const mediaItem = {
                name: file.name,
                type: file.type,
                size: file.size,
                data: blobData,
                date: new Date().toISOString()
            };
            const request = store.add(mediaItem);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    function getAllMedia() {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
    function deleteMediaFromDB(id) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    function createMediaElement(item, blobUrl) {
        const isVideo = item.type.startsWith('video/');
        const isLiked = likedMedia.includes(item.id);
        const isSaved = savedMedia.includes(item.id);
        const mediaItem = document.createElement('div');
        mediaItem.className = 'gif-item';
        mediaItem.dataset.id = item.id;
        let mediaTag = '';
        if (isVideo) mediaTag = `<video src="${blobUrl}" muted loop playsinline preload="metadata" style="pointer-events: none;"></video>`;
        else mediaTag = `<img src="${blobUrl}" alt="${item.name}" loading="lazy">`;
        mediaItem.innerHTML = `
            ${mediaTag}
            <div class="gif-actions">
                <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${item.id}, event)"><i class="fas fa-heart"></i></button>
                <button class="action-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave(${item.id}, event)"><i class="fas fa-bookmark"></i></button>
                <button class="action-btn" onclick="shareMedia(${item.id}, event)"><i class="fas fa-share-alt"></i></button>
                <button class="action-btn" onclick="downloadMedia(${item.id}, event)"><i class="fas fa-download"></i></button>
                <button class="action-btn" onclick="deleteMedia(${item.id}, event)"><i class="fas fa-trash"></i></button>
            </div>
            <div class="gif-overlay">
                <div class="gif-title">${item.name.substring(0, 35)}${item.name.length > 35 ? '...' : ''}</div>
                <div class="gif-stats"><span><i class="fas fa-calendar"></i> ${new Date(item.date).toLocaleDateString()}</span></div>
            </div>
        `;
        if (isVideo) {
            const video = mediaItem.querySelector('video');
            videoObserver.observe(video);
            mediaItem.addEventListener('remove', () => videoObserver.unobserve(video));
        }
        mediaItem.addEventListener('click', () => openModal(item.id));
        return mediaItem;
    }
async function renderGallery(mediaList) {
    document.querySelectorAll('video').forEach(v => videoObserver.unobserve(v));
    revokeAllBlobUrls();
    gallery.innerHTML = '';
    if (mediaList.length === 0) {
        gallery.innerHTML = '<p style="color:white; text-align:center; grid-column:1/-1;">لا توجد وسائط. ارفع ملفات أو أضف عبر رابط!</p>';
        return;
    }
    for (const item of mediaList) {
        const blobUrl = URL.createObjectURL(item.data);
        activeBlobUrls.add(blobUrl);
        gallery.appendChild(createMediaElement(item, blobUrl));
    }
}
async function loadAndRenderMedia() {
    try {
        const mediaList = await getAllMedia();
        currentMediaList = mediaList;
        renderGallery(mediaList);
    } catch (error) { console.error(error); }
}
window.openModal = (id) => {
    const item = currentMediaList.find(m => m.id === id);
    if (!item) return;
    currentModalId = id;
    const url = URL.createObjectURL(item.data);
    const isVideo = item.type.startsWith('video/');
    modalMediaContainer.innerHTML = isVideo ? `<video src="${url}" controls autoplay style="max-width:100%; max-height:80vh;"></video>` : `<img src="${url}" alt="${item.name}" style="max-width:100%; max-height:80vh;">`;
    modal.classList.add('show');
    modalMediaContainer.dataset.currentBlobUrl = url;
};
window.closeModal = (event) => {
    if (event) event.stopPropagation();
    modal.classList.remove('show');
    const currentUrl = modalMediaContainer.dataset.currentBlobUrl;
    if (currentUrl) URL.revokeObjectURL(currentUrl);
    modalMediaContainer.innerHTML = '';
    currentModalId = null;
};
window.toggleLike = (id, event) => { event.stopPropagation(); let idx = likedMedia.indexOf(id); idx === -1 ? likedMedia.push(id) : likedMedia.splice(idx,1); localStorage.setItem('likedMedia', JSON.stringify(likedMedia)); showNotification(idx === -1 ? 'تمت الإضافة إلى الإعجابات ❤️' : 'تم إزالة الإعجاب'); renderGallery(currentMediaList); };
window.toggleSave = (id, event) => { event.stopPropagation(); let idx = savedMedia.indexOf(id); idx === -1 ? savedMedia.push(id) : savedMedia.splice(idx,1); localStorage.setItem('savedMedia', JSON.stringify(savedMedia)); showNotification(idx === -1 ? 'تم الحفظ في المفضلة 📁' : 'تمت الإزالة من المفضلة'); renderGallery(currentMediaList); };
window.shareMedia = async (id, event) => { event.stopPropagation(); const item = currentMediaList.find(m => m.id === id); if(!item) return; try { const file = new File([item.data], item.name, { type: item.type }); if(navigator.share) await navigator.share({ title: item.name, files: [file] }); else showNotification('المشاركة غير مدعومة'); } catch(e){} };
window.downloadMedia = (id, event) => { event.stopPropagation(); const item = currentMediaList.find(m => m.id === id); if(!item) return; const url = URL.createObjectURL(item.data); const a = document.createElement('a'); a.href = url; a.download = item.name; a.click(); URL.revokeObjectURL(url); showNotification(`جاري تحميل ${item.name}`); };
window.deleteMedia = async (id, event) => { event.stopPropagation(); if(!confirm('حذف العنصر؟')) return; await deleteMediaFromDB(id); likedMedia = likedMedia.filter(l => l !== id); savedMedia = savedMedia.filter(s => s !== id); localStorage.setItem('likedMedia', JSON.stringify(likedMedia)); localStorage.setItem('savedMedia', JSON.stringify(savedMedia)); showNotification('تم الحذف'); loadAndRenderMedia(); };
window.downloadCurrentMedia = () => { if(currentModalId) downloadMedia(currentModalId, new Event('click')); };
window.shareCurrentMedia = () => { if(currentModalId) shareMedia(currentModalId, new Event('click')); };
window.likeCurrentMedia = () => { if(currentModalId) toggleLike(currentModalId, new Event('click')); };
window.changeView = (view) => { currentView = view; gallery.className = `gallery ${view === 'list' ? 'list-view' : ''}`; document.querySelectorAll('.view-btn').forEach(btn => btn.classList.toggle('active', btn.querySelector(`.fa-${view === 'grid' ? 'th' : 'list'}`))); };
window.clearAllData = function() { if(!confirm('حذف جميع الصور والفيديوهات نهائياً؟')) return; localStorage.removeItem('likedMedia'); localStorage.removeItem('savedMedia'); localStorage.removeItem('theme'); likedMedia = []; savedMedia = []; indexedDB.deleteDatabase(DB_NAME).onsuccess = () => { showNotification('تم مسح البيانات، سيتم تحديث الصفحة'); setTimeout(() => location.reload(), 1200); }; };

    function getExtensionFromMime(mime) {
        const map = { 'image/gif':'gif','image/png':'png','image/jpeg':'jpg','image/webp':'webp','video/mp4':'mp4','video/webm':'webm','video/ogg':'ogv','image/svg+xml':'svg' };
        return map[mime] || 'media';
    }
    async function addMediaFromUrl() {
        let url = mediaUrlInput.value.trim();
        if(!url) { showNotification('الرجاء إدخال رابط صحيح', 'error'); return; }
        if(!url.startsWith('http://') && !url.startsWith('https://')) { showNotification('الرابط يجب أن يبدأ بـ http:// أو https://', 'error'); return; }
        addFromUrlBtn.disabled = true;
        addFromUrlBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جارٍ التحميل';
        try {
            const response = await fetch(url, { mode: 'cors' });
            if(!response.ok) throw new Error(`HTTP ${response.status}`);
            const contentType = response.headers.get('content-type') || '';
            if(!contentType.startsWith('image/') && !contentType.startsWith('video/')) throw new Error('الرابط لا يشير إلى صورة أو فيديو مدعوم');
            const blob = await response.blob();
            if(blob.size === 0) throw new Error('الملف فارغ');
            const ext = getExtensionFromMime(blob.type);
            const timestamp = Date.now();
            let filename = `media_${timestamp}.${ext}`;
            try {
                const urlObj = new URL(url);
                const pathSeg = urlObj.pathname.split('/').pop();
                if(pathSeg && pathSeg.includes('.')) filename = decodeURIComponent(pathSeg);
                else filename = `imported_${timestamp}.${ext}`;
            } catch(e) {}
            const file = new File([blob], filename, { type: blob.type });
            await saveMediaToDB(file, blob);
            showNotification(`✅ تمت إضافة ${filename} بنجاح`);
            mediaUrlInput.value = '';
            await loadAndRenderMedia();
        } catch(err) {
            console.error(err);
            showNotification(`فشل الإضافة: ${err.message || 'رابط غير صالح أو مشكلة CORS'}`, 'error');
        } finally {
            addFromUrlBtn.disabled = false;
            addFromUrlBtn.innerHTML = '<i class="fas fa-link"></i> إضافة';
        }
    }
    fileUpload.addEventListener('change', async (event) => {
        const files = Array.from(event.target.files);
        if(files.length===0) return;
        uploadProgressDiv.style.display = 'block';
        progressBar.value = 0;
        for(let i=0;i<files.length;i++) {
            const file = files[i];
            if(!file.type.startsWith('image/') && !file.type.startsWith('video/')) { showNotification(`${file.name} غير مدعوم`,'error'); continue; }
            progressStatus.textContent = `رفع ${file.name} (${i+1}/${files.length})`;
            const blob = new Blob([await file.arrayBuffer()], { type: file.type });
            await saveMediaToDB(file, blob);
            progressBar.value = ((i+1)/files.length)*100;
        }
        progressStatus.textContent = 'اكتمل الرفع!';
        setTimeout(()=> uploadProgressDiv.style.display = 'none',1500);
        loadAndRenderMedia();
        fileUpload.value = '';
    });
    addFromUrlBtn.addEventListener('click', addMediaFromUrl);
    mediaUrlInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addMediaFromUrl(); });
    function performSearch() {
        const term = searchInput.value.trim().toLowerCase();
        if(!term) renderGallery(currentMediaList);
        else renderGallery(currentMediaList.filter(item => item.name.toLowerCase().includes(term)));
    }
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keyup', (e) => { if(e.key === 'Enter') performSearch(); });
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        const icon = themeToggle.querySelector('i');
        if(document.body.classList.contains('dark-theme')) { icon.className = 'fas fa-sun'; localStorage.setItem('theme','dark'); }
        else { icon.className = 'fas fa-moon'; localStorage.setItem('theme','light'); }
    });
    function checkTheme() { if(localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-theme'); themeToggle.querySelector('i').className = 'fas fa-sun'; } }
    window.login = () => showNotification('تسجيل الدخول (وهمي)');
    window.register = () => showNotification('إنشاء حساب (وهمي)');
    let lastScrollTop = 0; const header = document.querySelector('.header');
    window.addEventListener('scroll', () => {
        const st = window.pageYOffset || document.documentElement.scrollTop;
        if(st>50) header.classList.add('header-shrink'); else header.classList.remove('header-shrink');
        if(st>lastScrollTop && st>70) header.classList.add('header-hidden'); else header.classList.remove('header-hidden');
        lastScrollTop = st;
    });
    async function startApp() { await initDB(); await loadAndRenderMedia(); checkTheme(); document.body.style.paddingTop = header.offsetHeight+'px'; window.addEventListener('resize',()=> document.body.style.paddingTop = header.offsetHeight+'px'); }
    startApp();
})();
</script>
